services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: merchant
      POSTGRES_PASSWORD: merchant
      POSTGRES_DB: merchant
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merchant -d merchant"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://merchant:merchant@db:5432/merchant
      MERCHANT_URL: ${MERCHANT_URL:-http://localhost:8000}
      IMAGES_URL: ${IMAGES_URL:-http://localhost:8000/v1/images}
      STORE_NAME: ${STORE_NAME:-My Store}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ENABLE_SCHEDULER: "true"
    volumes:
      - merchant_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  merchant_storage:
